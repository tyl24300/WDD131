<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Character Card</title>
  <link rel="stylesheet" href="character.css">
  <script src="character.js" defer></script>

<!-- Open Graph (Facebook, LinkedIn, etc.) -->
<meta property="og:type" content="website">
<meta property="og:title" content= "DND Character Snortleblat">
<meta property="og:description" content="Interactive website of my dnd character">
<meta property="og:url" content="https://facebook.com">
<meta property="og:image" content="facebook.png">

<!-- Twitter Card -->
<meta name="twitter:card" content="Twitter Image">
<meta name="twitter:title" content="DND Character Snortleblat">
<meta name="twitter:description" content="Interactive website of my dnd character">
<meta name="twitter:image" content="twitter.png">

  <div class="card">
    <img src="snortleblat.webp" alt="A DND character named Snortleblat">

    <div class="name">
      Snortleblat
    </div>

    <div class="stats">
    <p>Class: Swamp Beast Diplomat</p>

    <label>Health:</label>
    <input id="health" type="number" value="100">
    <input id="death">
    <br>

    <label>Level:</label>
    <input id="level" type="number" value="5">
    </div>


    <div class="buttons">
      <button id="attacking">Attack</button>
      <button id="leveling">Level Up</button>
    </div>

  </div>

</body>
</html>
