
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Event Ticket</title>
  <link rel="icon" href="favicon.ico">
  <link rel="stylesheet" href="event.css" />
  <script src="event.js" defer></script>
</head>
<body>
  <main class="wrapper">
    <h1>Event Ticket</h1>

    <form id="fsyForm">
      <div class="field">
        <label for="firstName">First Name</label>
        <input id="firstName" name="firstName" type="text" required />
      </div>

      <div class="field">
        <label for="lastName">Last Name</label>
        <input id="lastName" name="lastName" type="text" required />
      </div>

      <div class="field full">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" required />
      </div>

      <div class="field">
        <label for="travelRange">Type</label>
        <select
          id="travelRange"
          name="travelRange"
          aria-controls="notesContainer"
          required
        >
          <option value="">Choose one</option>
          <option value="student">Student</option>
          <option value="guest">Guest</option>
        </select>
      </div>

      <div class="field">
        <label for="availableDate">Event Date</label>
        <input id="availableDate" name="availableDate" type="date" required />
      </div>

      <div id="access_code" class="field full" hidden>
        <label for="code">Access Code</label>
        <input id="code" name="Access" type="text" />
      </div>

      <div id="student_id" class="field full" hidden>
        <label for="student">Student ID#</label>
        <input id="student" name="Student" type="text" />
      </div>

      <button class="full" type="submit">Create Ticket</button>
    </form>

    <section id="output" aria-live="polite"></section>
  </main>
</body>
</html>
