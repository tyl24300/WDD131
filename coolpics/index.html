<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cool Pics</title>    
    <link href="coolpics.css" rel="stylesheet">
</head>
<body>
    <div id="top">
    <h1>Cool Pics 📷</h1>
    <button class="menu">Menu</button>
    <nav id="navigation">
        <a href="#">Home</a>
        <a href="#">People</a>
        <a href="#">Places</a>
        <a href="#">About</a>
        <a href="#">Contacts</a>
    </nav>
    </div>

    <div id="body">
        <p>Current Work</p>
        <div id="images">
        <img class="mobile" src="norris-sm.jpg" alt="picture">
        <img class="mobile" src="norris-sm.jpg" alt="picture">
        <img class="mobile" src="norris-sm.jpg" alt="picture">
        <img class="tablet" src="norris-sm.jpg" alt="picture">
        <img class="tablet" src="norris-sm.jpg" alt="picture">
        <img class="tablet" src="norris-sm.jpg" alt="picture">
        <img class="desktop" src="norris-sm.jpg" alt="picture">
        <img class="desktop" src="norris-sm.jpg" alt="picture">
        <img class="desktop" src="norris-sm.jpg" alt="picture">
        </div>
        
        <dialog>
        <img>
        <button class="close-viewer">X</button>
        </dialog>

        <script>
const body = document.querySelector('body');
const modal = document.querySelector('dialog');
const modalImage = modal.querySelector('img');
const closeButton = modal.querySelector('.close-viewer');
const menu = document.querySelector('.menu')
const navbar = document.getElementById('navigation');


menu.addEventListener('click', function() {
    navbar.classList.toggle("show");
});

body.addEventListener('click', openModal);

function openModal(event) {
    if (event.target.tagName !== "IMG") {
    return;
    }

    console.log(event.target.src);
    let imageSrc = event.target.src;

    modalImage.src = imageSrc.replace("sm", "full");
    modal.showModal();

}
closeButton.addEventListener('click', () => {
    modal.close();
});


modal.addEventListener('click', (event) => {
    if (event.target === modal) {
        modal.close();
    }
});
        </script>

    </div>

<footer id="end">
    <p>© 2025 Not a real site ☺️</p>
</footer>



    
</body>
</html>
